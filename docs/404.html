# 用最简单有效的方式重写 404.html
@'
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>众创医案平台</title>
    <script>
        // 专为众创医案平台设计的SPA回退方案
        // 解决中文路径和路由问题
        
        const path = window.location.pathname;
        const hash = window.location.hash;
        const search = window.location.search;
        
        console.log('=== 404页面诊断 ===');
        console.log('路径:', path);
        console.log('Hash:', hash);
        console.log('搜索参数:', search);
        
        // 目标URL
        let targetUrl = './'; // 总是从应用根目录开始
        
        // 情况1：已经有正确的hash路由
        if (hash && hash.startsWith('#/')) {
            targetUrl += hash.substring(1); // 去掉#，因为我们要加在./后面
        }
        // 情况2：有hash但不正确
        else if (hash && hash !== '#' && hash !== '#/') {
            targetUrl += hash.replace(/^#/, '#/');
        }
        // 情况3：没有hash，需要重定向
        else {
            // 默认重定向到移动端（开发期间方便测试）
            targetUrl += '#/mobile/cases';
        }
        
        // 保留搜索参数
        if (search) {
            targetUrl = targetUrl.replace('#', search + '#');
        }
        
        console.log('重定向到:', targetUrl);
        
        // 立即重定向
        window.location.replace(targetUrl);
    </script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            max-width: 500px;
            padding: 2rem;
        }
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .links {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        .links a {
            color: white;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border: 1px solid white;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .links a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏥</div>
        <div class="spinner"></div>
        <h1>众创医案平台</h1>
        <p>正在加载应用程序，请稍候...</p>
        
        <div class="links">
            <a href="./#/mobile/cases">进入移动端</a>
            <a href="./#/cases">进入电脑端</a>
        </div>
        
        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.8;">
            如果长时间没有跳转，请点击上面的链接手动进入
        </p>
    </div>
</body>
</html>
'@ | Out-File -FilePath "public/404.html" -Encoding UTF8

Write-Host "✅ 已修复 public/404.html" -ForegroundColor Green
Write-Host "文件大小: $((Get-Item 'public/404.html').Length) 字节" -ForegroundColor Cyan
